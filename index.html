<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title></title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
    background: #cce7ff;
      text-align: center;
      padding: 20px;
    }

    .frase-box {
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: 500;
      color: #444;
      min-height: 60px;
    }

    .heart {
      position: fixed;
      color: red;
      font-size: 20px;
      animation: subir 2s linear forwards;
    }

    @keyframes subir {
      0% {transform: translateY(0); opacity:1;}
      100% {transform: translateY(-200px); opacity:0;}
    }

    iframe {
      margin-top: 20px;
      border-radius: 10px;
      display: none;
    }

.carousel {
  max-width: 580px;
  margin: 20px auto;
  border-radius: 20px;
  overflow: hidden;
}

.carousel-item {
  height: 450px;
  position: relative;
  overflow: hidden;
}

.carousel-item::before {
  content: "";
  position: absolute;
  inset: 0;
  background: inherit;
  filter: blur(20px);
  transform: scale(1.2);
  z-index: 0;
}

.carousel-item img {
  position: relative;
  max-height: 100%;
  max-width: 100%;
  object-fit: contain;
  z-index: 1;
}
  </style>
</head>

<body>

<h2>✨ Rute 1:16 "Aonde quer que fores, irei eu; e onde quer que pousares, ali pousarei eu; o teu poco é o meu povo, o teu Deus é o meu"✨</h2>

<div id="carouselExample" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000">
  <div class="carousel-inner">

    <div class="carousel-item active">
      <img src="img/foto1.jpeg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="img/foto2.jpeg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="img/foto3.jpeg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="img/foto4.jpeg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="img/foto5.jpeg" class="d-block w-100">
    </div>

    <div class="carousel-item">
      <img src="img/foto6.jpeg" class="d-block w-100">
    </div>

  </div>
</div>


<button class="btn btn-primary mt-4" onclick="mostrarFrase()">Mostrar frase 💬</button>

<div class="frase-box" id="frase"></div>


<button class="btn btn-danger mt-3" onclick="coracao()">❤️ Surpresa</button>

<button class="btn btn-warning mt-3" onclick="tocarMusica()">🎵 Tocar música</button>

<audio id="musica">
  <source src="img/Pitty.mp3" type="audio/mpeg">
  Seu navegador não suporta áudio.
</audio>

<div class="ratio ratio-16x9 mt-3" id="videoContainer" style="display:none;">
  <video controls>
    <source src="img/video.mp4" type="video/mp4">
    Seu navegador não suporta vídeo.
  </video>
</div>

<script>
  const frases = [
    {livro: "Verity", texto: "Você é mais forte do que imagina."},
    {livro: "O Lado Feio do Amor", texto: "Nem tudo que dói vem para te destruir."},
    {livro: "Todas as Suas (Im)Perfeições", texto: "Até o que está quebrado pode continuar."},
    {livro: "Novembro, 9", texto: "O tempo também cura."},
    {livro: "Confesse", texto: "Você merece ser vista como realmente é."},
    {livro: "É Assim Que Acaba", texto: "Escolher a si mesma também é amor."},
    {livro: "Verity", texto: "Você é mais forte do que imagina e mais capaz do que acredita."},
    {livro: "Novembro, 9", texto: "Algumas histórias só ficam bonitas porque passam pelo tempo."},
    {livro: "Confesse", texto: "Ser verdadeira consigo mesma já é um recomeço."},
    {livro: "É Assim Que Acaba", texto: "Escolher você mesma também é um ato de amor."},
  ];

  function mostrarFrase() {
    const random = Math.floor(Math.random() * frases.length);
    document.getElementById("frase").innerHTML =
      "<strong>" + frases[random].livro + ":</strong> " + frases[random].texto;
  }

function coracao() {
  for (let i = 0; i < 15; i++) {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.top = "80vh";
    document.body.appendChild(heart);

    setTimeout(() => {
      heart.remove();
    }, 2000);
  }

  document.getElementById("videoContainer").style.display = "block";
}

let tocando = false;

function tocarMusica() {
  const musica = document.getElementById("musica");

  if (!tocando) {
    musica.play();
    tocando = true;
  } else {
    musica.pause();
    tocando = false;
  }
}

document.querySelectorAll('.carousel-item').forEach(item => {
  const img = item.querySelector('img');
  if (img) {
    item.style.backgroundImage = `url(${img.src})`;
    item.style.backgroundSize = "cover";
    item.style.backgroundPosition = "center";
  }
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
